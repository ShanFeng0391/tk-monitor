services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tiktok
      POSTGRES_PASSWORD: tiktok123
      POSTGRES_DB: tiktok_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tiktok:tiktok123@postgres:5432/tiktok_monitor
      DATABASE_URL_SYNC: postgresql://tiktok:tiktok123@postgres:5432/tiktok_monitor
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    volumes:
      - cover_data:/app/data/covers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tiktok:tiktok123@postgres:5432/tiktok_monitor
      DATABASE_URL_SYNC: postgresql://tiktok:tiktok123@postgres:5432/tiktok_monitor
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    volumes:
      - cover_data:/app/data/covers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  minio_data:
  cover_data:
